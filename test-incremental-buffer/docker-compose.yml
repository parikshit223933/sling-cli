version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: sling-test-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: test_src
      TZ: Asia/Kolkata
    command: >
      --default-time-zone=+05:30
      --default-authentication-plugin=mysql_native_password
      --transaction-isolation=REPEATABLE-READ
    ports:
      - "13306:3306"
    volumes:
      - ./init-mysql.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
      interval: 2s
      timeout: 5s
      retries: 30

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: sling-test-clickhouse
    environment:
      CLICKHOUSE_DB: test_tgt
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_SKIP_USER_SETUP: "1"
    ports:
      - "18123:8123"
      - "19000:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 2s
      timeout: 5s
      retries: 30
